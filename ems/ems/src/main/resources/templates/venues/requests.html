<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: mainLayout(~{::content})}">

<head>
    <title>Booking Requests</title>
</head>

<body>
    <section th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0 text-dark">Booking Requests</h2>
                <p class="text-muted mb-0">Review and respond to pending venue booking requests</p>
            </div>
            <div class="badge bg-warning bg-opacity-10 text-warning px-3 py-2 rounded-pill fw-bold">
                <i class="bi bi-hourglass-split me-1"></i> <span th:text="${#lists.size(bookings)}">0</span> Pending
            </div>
        </div>

        <!-- Alert Messages -->
        <div th:if="${message}" th:class="'alert alert-' + ${messageType} + ' alert-dismissible fade show rounded-4 shadow-sm border-0 mb-4'" role="alert">
            <i th:class="${messageType == 'success'} ? 'bi bi-check-circle-fill me-2' : 'bi bi-exclamation-triangle-fill me-2'"></i>
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr class="small text-uppercase text-muted">
                                <th class="py-3 px-4">Request Details</th>
                                <th class="py-3">Venue & Time</th>
                                <th class="py-3">Society</th>
                                <th class="py-3">Admin Note / Reason</th>
                                <th class="py-3 text-end px-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="booking : ${bookings}">
                                <td class="py-4 px-4">
                                    <div class="fw-bold text-dark" th:text="${booking.event.title}">Event Title</div>
                                    <div class="extra-small text-muted" th:text="${#temporals.format(booking.bookingDate, 'EEEE, MMM dd, yyyy')}">Date</div>
                                </td>
                                <td>
                                    <div class="d-flex align-items-center gap-2 mb-1">
                                        <i class="bi bi-building text-primary"></i>
                                        <span class="fw-semibold small" th:text="${booking.venue.name}">Venue</span>
                                    </div>
                                    <div class="extra-small text-muted">
                                        <i class="bi bi-clock me-1"></i>
                                        <span th:text="${#temporals.format(booking.startTime, 'HH:mm') + ' - ' + #temporals.format(booking.endTime, 'HH:mm')}">Time</span>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge bg-light text-dark fw-normal px-3" th:text="${booking.society.name}">Society</span>
                                </td>
                                <td style="min-width: 250px;">
                                    <input type="text" th:id="'note-' + ${booking.id}" class="form-control form-control-sm rounded-pill bg-light border-0 px-3" 
                                           placeholder="Optional note or rejection reason...">
                                </td>
                                <td class="text-end px-4">
                                    <div class="d-flex justify-content-end gap-2">
                                        <button type="button" class="btn btn-sm btn-success rounded-pill px-3 shadow-sm" 
                                                th:onclick="'submitAction(' + ${booking.id} + ', \'approve\')'">
                                            Approve
                                        </button>
                                        <button type="button" class="btn btn-sm btn-outline-danger rounded-pill px-3 shadow-sm" 
                                                th:onclick="'submitAction(' + ${booking.id} + ', \'reject\')'">
                                            Reject
                                        </button>
                                    </div>
                                    <!-- Hidden forms for submission -->
                                    <form th:id="'form-approve-' + ${booking.id}" th:action="@{/venues/requests/{id}/approve(id=${booking.id})}" method="post" style="display:none;">
                                        <input type="hidden" name="adminNote" th:id="'hidden-note-approve-' + ${booking.id}">
                                    </form>
                                    <form th:id="'form-reject-' + ${booking.id}" th:action="@{/venues/requests/{id}/reject(id=${booking.id})}" method="post" style="display:none;">
                                        <input type="hidden" name="adminNote" th:id="'hidden-note-reject-' + ${booking.id}">
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(bookings)}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <div class="opacity-25 mb-3">
                                        <i class="bi bi-check2-all fs-1"></i>
                                    </div>
                                    <h5 class="fw-bold">All caught up!</h5>
                                    <p class="small mb-0">There are no pending booking requests at the moment.</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <script>
            function submitAction(id, action) {
                const noteValue = document.getElementById('note-' + id).value;
                const hiddenInput = document.getElementById('hidden-note-' + action + '-' + id);
                hiddenInput.value = noteValue;
                
                if (action === 'reject' && !noteValue.trim()) {
                    if (!confirm('Are you sure you want to reject this booking without a reason?')) {
                        return;
                    }
                }
                
                document.getElementById('form-' + action + '-' + id).submit();
            }
        </script>
    </section>
</body>
</html>
