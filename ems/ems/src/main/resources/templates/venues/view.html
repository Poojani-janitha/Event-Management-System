<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: mainLayout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Details</title>
</head>
<body>
<section class="py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a th:href="@{/venues}" class="btn btn-outline-primary btn-md">
            <i class="bi bi-arrow-left me-2"></i> Back to Venues
        </a>

    </div>

    <div class="card shadow border-0">
        <div class="card-header bg-light d-flex justify-content-between align-items-center">
            <h4 class="mb-0 fw-bold" th:text="${venue.name}">Venue Name</h4>
            <span class="badge"
                  th:classappend="${venue.active} ? 'bg-success' : 'bg-danger'"
                  th:text="${venue.active} ? 'Active' : 'Inactive'">Status</span>
        </div>
        <div class="card-body p-4">
            <div class="row g-4">
                <div class="col-md-6">
                    <p class="text-muted mb-1 fw-bold">Venue ID</p>
                    <p class="mb-0" th:text="${venue.id}">1</p>
                </div>
                <div class="col-md-6">
                    <p class="text-muted mb-1 fw-bold">Location</p>
                    <p class="mb-0" th:text="${venue.location}">Building A</p>
                </div>
                <div class="col-md-6">
                    <p class="text-muted mb-1 fw-bold">Capacity</p>
                    <p class="mb-0" th:text="${venue.capacity}">100</p>
                </div>
                <!-- <div class="col-md-6">
                    <p class="text-muted mb-1 fw-bold">Created At</p>
                    <p class="mb-0" th:text="${venue.created_at != null ? #temporals.format(venue.created_at.toLocalDateTime(), 'yyyy-MM-dd HH:mm') : 'N/A'}">N/A</p>
                </div> -->
                <div class="col-12">
                    <p class="text-muted mb-1 fw-bold">Description</p>
                    <p class="mb-0" th:text="${venue.description != null and !#strings.isEmpty(venue.description) ? venue.description : 'No description provided.'}">No description provided.</p>
                </div>
                <div class="col-12">
                    <p class="text-muted mb-2 fw-bold">Facilities</p>
                    <div class="d-flex flex-wrap gap-2">
                        <span th:class="${venue.has_projector} ? 'badge bg-success' : 'badge bg-secondary'">
                            Projector
                        </span>
                        <span th:class="${venue.has_ac} ? 'badge bg-success' : 'badge bg-secondary'">
                            Air Conditioning
                        </span>
                        <span th:class="${venue.has_sound} ? 'badge bg-success' : 'badge bg-secondary'">
                            Sound System
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
