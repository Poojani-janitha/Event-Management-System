<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: mainLayout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Venue</title>
</head>
<body>
    <section class="py-4">
        <div class="card shadow border-0" style="max-width: 700px; margin: 0 auto;">
            <div class="card-body p-4">
                <h3 class="fw-bold mb-4">Edit Venue</h3>

                <!-- MESSAGE ALERT -->
                <div th:if="${message}" class="alert alert-dismissible fade show" th:classappend="'alert-' + ${messageType}" role="alert">
                    <i th:class="'bi ' + (${status} == 'success' ? 'bi-check-circle' : 'bi-exclamation-circle') + ' me-2'"></i>
                    <strong th:text="${status == 'success' ? 'Success!' : 'Error!'}"></strong>
                    <span th:text="${message}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <form th:action="@{/venues/{id}/update(id=${venue.id})}" th:object="${venue}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Venue Name <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="e.g., Auditorium A" required>
                        <div th:if="${#fields.hasErrors('name')}" class="text-danger small mt-1" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Location <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{location}" class="form-control" placeholder="e.g., Building 1, Floor 3" required>
                        <div th:if="${#fields.hasErrors('location')}" class="text-danger small mt-1" th:errors="*{location}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Capacity <span class="text-danger">*</span></label>
                        <input type="number" th:field="*{capacity}" class="form-control" placeholder="e.g., 500" required>
                        <div th:if="${#fields.hasErrors('capacity')}" class="text-danger small mt-1" th:errors="*{capacity}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Description</label>
                        <textarea th:field="*{description}" class="form-control" rows="4" placeholder="Describe the venue..."></textarea>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="form-check">
                                <input type="checkbox" th:field="*{has_projector}" class="form-check-input" id="projector">
                                <label class="form-check-label" for="projector">
                                    Has Projector
                                </label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-check">
                                <input type="checkbox" th:field="*{has_ac}" class="form-check-input" id="ac">
                                <label class="form-check-label" for="ac">
                                    Has AC
                                </label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-check">
                                <input type="checkbox" th:field="*{has_sound}" class="form-check-input" id="sound">
                                <label class="form-check-label" for="sound">
                                    Has Sound System
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Venue Status</label>
                        <div class="form-check form-switch">
                            <input type="checkbox" th:field="*{active}" class="form-check-input" id="activeSwitch" style="width: 3em; height: 1.5em; cursor: pointer;" >
                            <label class="form-check-label" for="activeSwitch">
                                <span th:text="${venue.active} ? 'Active' : 'Inactive'" class="ms-2 fw-bold" 
                                      th:classappend="${venue.active} ? 'text-success' : 'text-danger'"></span>
                            </label>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle me-2"></i> Update Venue
                        </button>
                        <a th:href="@{/venues/{id}(id=${venue.id})}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-2"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
