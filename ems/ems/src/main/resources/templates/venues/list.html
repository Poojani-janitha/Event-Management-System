<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: mainLayout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Management</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">Venue Management</h2>
            <p class="text-muted mb-0">Manage all venues</p>
        </div>
        <a th:href="@{/venues/addVenue}" class="btn btn-primary btn-md">
            <i class="bi bi-plus-circle me-2"></i> Add Venue
        </a>
    </div>

    <!-- MESSAGE ALERT FROM VenueDto -->
    <div th:if="${message}" class="alert alert-dismissible fade show" th:classappend="'alert-' + ${messageType}" role="alert">
        <i th:class="'bi ' + (${status} == 'success' ? 'bi-check-circle' : 'bi-exclamation-circle') + ' me-2'"></i>
        <strong th:text="${status == 'success' ? 'Success!' : 'Error!'}"></strong>
        <span th:utext="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Location</th>
                        <th>Capacity</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="venue : ${venues}">
                        <td th:text="${venue.id}"></td>
                        <td th:text="${venue.name}"></td>
                        <td th:text="${venue.location}"></td>
                        <td th:text="${venue.capacity}"></td>
                        <td>
                            <span th:class="${venue.active} ? 'badge bg-success' : 'badge bg-danger'"
                                  th:text="${venue.active} ? 'Active' : 'Inactive'">
                                Status
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/venues/{id}(id=${venue.id})}" class="btn btn-sm btn-info">View</a>
                            <a th:href="@{/venues/{id}/edit(id=${venue.id})}" class="btn btn-sm btn-warning">Edit</a>
                            <form th:action="@{/venues/{id}/delete(id=${venue.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this venue?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(venues)}" class="alert alert-info">
                No venues found. <a th:href="@{/venues/addVenue}">Create one now</a>
            </div>
        </div>
    </div>
</section>
</body>
</html>
