<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: mainLayout(~{::section})}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${event.id == null} ? 'New Event' : 'Edit Event'">Event Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light">
  <section>
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-7">

        
        <div class="card shadow-sm border-0">
          <div class="card-header bg-primary text-white py-3">
            <h5 class="mb-0">
              <i class="bi bi-calendar-plus me-2"></i>
              <span th:text="${event.id == null} ? 'Create New Event' : 'Edit Event'">Event Form</span>
            </h5>
          </div>

          <div class="card-body p-4">

           
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
              <i class="bi bi-check-circle me-2"></i>
              <span th:text="${success}"></span>
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
              <i class="bi bi-exclamation-triangle me-2"></i>
              <span th:text="${error}"></span>
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            
            <form th:action="${event.id == null} ? @{/events/new} : @{/events/{id}/edit(id=${event.id})}"
                  th:object="${event}"
                  method="post"
                  novalidate>

             
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

             
              <div class="mb-3">
                <label for="title" class="form-label fw-semibold">
                  Event Title <span class="text-danger">*</span>
                </label>
                <input type="text"
                       id="title"
                       class="form-control"
                       th:field="*{title}"
                       placeholder="e.g. Arduino Bootcamp 2025"
                       required/>
                      <small class="text-danger d-block mt-1"
                        th:if="${#fields.hasErrors('title')}"
                        th:errors="*{title}"></small>
              </div>

              
              <div class="mb-3">
                <label for="description" class="form-label fw-semibold">Description</label>
                <textarea id="description"
                          class="form-control"
                          th:field="*{description}"
                          rows="4"
                          placeholder="Describe the event..."></textarea>
              </div>

             
              <div class="mb-3">
                <label for="eventType" class="form-label fw-semibold">
                  Event Type <span class="text-danger">*</span>
                </label>
                <select id="eventType" class="form-select" th:field="*{eventType}" required>
                  <option value="">— Select Type —</option>
                  <option th:each="type : ${eventTypes}"
                          th:value="${type}"
                          th:text="${type}">
                  </option>
                </select>
                <small class="text-danger d-block mt-1"
                       th:if="${#fields.hasErrors('eventType')}"
                       th:errors="*{eventType}"></small>
              </div>

              <div class="mb-3">
                <label for="society" class="form-label fw-semibold">
                  Society <span class="text-danger">*</span>
                </label>
                <div th:if="${selectedSocietyId != null}">
                    <input type="hidden" name="selectedSocietyId" th:value="${selectedSocietyId}"/>
                  <input type="hidden" th:field="*{society.id}"/>
                  <input type="text"
                         class="form-control"
                      th:value="${selectedSocietyName != null ? selectedSocietyName : (event.society != null ? event.society.name : '')}"
                         readonly/>
                  <small class="text-muted d-block mt-1">Society is locked because you created this event from a selected society filter.</small>
                    <small class="text-danger d-block mt-1"
                      th:if="${#fields.hasErrors('society')}"
                      th:errors="*{society}"></small>
                </div>
                <select id="society" class="form-select" th:field="*{society.id}" required
                        th:unless="${selectedSocietyId != null}">
                  <option value="">— Select Society —</option>
                  <option th:each="s : ${societies}"
                          th:value="${s.id}"
                          th:text="${s.name}">
                  </option>
                </select>
                  <small class="text-danger d-block mt-1"
                    th:if="${#fields.hasErrors('society')}"
                    th:errors="*{society}"></small>
              </div>

             
              <div class="mb-3">
                <label for="expectedAttendees" class="form-label fw-semibold">Expected Attendees</label>
                <input type="number"
                       id="expectedAttendees"
                       class="form-control"
                       th:field="*{expectedAttendees}"
                       min="1"
                       placeholder="e.g. 50"/>
                  <small class="text-danger d-block mt-1"
                    th:if="${#fields.hasErrors('expectedAttendees')}"
                    th:errors="*{expectedAttendees}"></small>
              </div>

              
              <div class="mb-4">
                <label for="status" class="form-label fw-semibold">
                  Status <span class="text-danger">*</span>
                </label>
                <select id="status" class="form-select" th:field="*{status}" required>
                  <option value="DRAFT">DRAFT — not visible publicly</option>
                  <option value="PUBLISHED">PUBLISHED — visible to all</option>
                </select>
                <small class="text-danger d-block mt-1"
                       th:if="${#fields.hasErrors('status')}"
                       th:errors="*{status}"></small>
              </div>

            
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">
                  <i class="bi bi-save me-1"></i>
                  <span th:text="${event.id == null} ? 'Create Event' : 'Save Changes'">Save</span>
                </button>
                <a th:href="@{/events}" class="btn btn-outline-secondary px-4">
                  <i class="bi bi-arrow-left me-1"></i> Cancel
                </a>
              </div>

            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
