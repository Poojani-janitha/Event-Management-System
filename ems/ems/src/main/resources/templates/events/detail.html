<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: mainLayout(~{::section})}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${event.title}">Event Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    .badge-WORKSHOP    { background-color: #0d6efd; }
    .badge-SEMINAR     { background-color: #6610f2; }
    .badge-CULTURAL    { background-color: #d63384; }
    .badge-COMPETITION { background-color: #fd7e14; }
    .badge-OTHER       { background-color: #6c757d; }
    .status-PUBLISHED  { background-color: #198754; }
    .status-DRAFT      { background-color: #adb5bd; color: #212529 !important; }
    .info-row { border-bottom: 1px solid #f0f0f0; padding: 0.75rem 0; }
    .info-row:last-child { border-bottom: none; }
  </style>
</head>
<body class="bg-light">
  <section>
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        
        <a th:href="@{/events}" class="btn btn-outline-secondary btn-sm mb-3">
          <i class="bi bi-arrow-left me-1"></i> Back to Events
        </a>

       
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
          <i class="bi bi-check-circle me-2"></i>
          <span th:text="${success}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
          <i class="bi bi-exclamation-triangle me-2"></i>
          <span th:text="${error}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        
        <div class="card shadow-sm border-0">

         
          <div class="card-header bg-white border-bottom py-3">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
              <div>
                <h4 class="mb-1 fw-bold" th:text="${event.title}">Event Title</h4>
                <div class="d-flex gap-2 flex-wrap">
                 
                  <span class="badge text-white"
                        th:classappend="'badge-' + ${event.eventType}"
                        th:text="${event.eventType}">
                  </span>
                  
                  <span class="badge text-white"
                        th:classappend="'status-' + ${event.status}"
                        th:text="${event.status}">
                  </span>
                </div>
              </div>

              
              <div class="d-flex gap-2 flex-wrap" sec:authorize="hasRole('SOCIETY_ADMIN')">
                <a th:href="@{/events/{id}/edit(id=${event.id})}"
                   class="btn btn-warning btn-sm">
                  <i class="bi bi-pencil me-1"></i> Edit
                </a>

                
                <a th:href="@{/bookings/new(eventId=${event.id})}"
                   class="btn btn-success btn-sm">
                  <i class="bi bi-building me-1"></i> Book a Venue
                </a>

                
                <form th:action="@{/events/{id}/delete(id=${event.id})}"
                      method="post"
                      onsubmit="return confirm('Are you sure you want to delete this event? This cannot be undone.')">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-danger btn-sm">
                    <i class="bi bi-trash me-1"></i> Delete
                  </button>
                </form>
              </div>
            </div>
          </div>

          
          <div class="card-body p-4">

        
            <div class="mb-4">
              <h6 class="text-muted text-uppercase fw-semibold mb-2" style="font-size:0.75rem; letter-spacing:.05em">
                Description
              </h6>
              <p class="mb-0"
                 th:text="${event.description ?: 'No description provided.'}"
                 style="line-height:1.7">
              </p>
            </div>

            <hr/>

            
            <div class="row g-0">

              <div class="col-12 info-row">
                <div class="row">
                  <div class="col-4 text-muted fw-semibold">
                    <i class="bi bi-people me-1"></i> Society
                  </div>
                  <div class="col-8" th:text="${event.society.name}">—</div>
                </div>
              </div>

              <div class="col-12 info-row">
                <div class="row">
                  <div class="col-4 text-muted fw-semibold">
                    <i class="bi bi-person me-1"></i> Organiser
                  </div>
                  <div class="col-8" th:text="${event.organiser != null ? event.organiser.fullName : '—'}">—</div>
                </div>
              </div>

              <div class="col-12 info-row">
                <div class="row">
                  <div class="col-4 text-muted fw-semibold">
                    <i class="bi bi-tag me-1"></i> Type
                  </div>
                  <div class="col-8" th:text="${event.eventType}">—</div>
                </div>
              </div>

              <div class="col-12 info-row">
                <div class="row">
                  <div class="col-4 text-muted fw-semibold">
                    <i class="bi bi-person-fill-check me-1"></i> Expected Attendees
                  </div>
                  <div class="col-8"
                       th:text="${event.expectedAttendees != null ? event.expectedAttendees : '—'}">
                  </div>
                </div>
              </div>

              <div class="col-12 info-row">
                <div class="row">
                  <div class="col-4 text-muted fw-semibold">
                    <i class="bi bi-toggle-on me-1"></i> Status
                  </div>
                  <div class="col-8">
                    <span class="badge text-white"
                          th:classappend="'status-' + ${event.status}"
                          th:text="${event.status}">
                    </span>
                  </div>
                </div>
              </div>

            </div>

          </div>

        
          <div class="card-footer bg-white border-top p-4">
            <h6 class="fw-semibold mb-3">
              <i class="bi bi-building me-1"></i> Venue Bookings for This Event
            </h6>

            <div th:if="${bookings == null or #lists.isEmpty(bookings)}"
                 class="text-muted fst-italic">
              No venue bookings yet.
              <a th:href="@{/bookings/new(eventId=${event.id})}"
                 sec:authorize="hasRole('SOCIETY_ADMIN')">
                Request one now.
              </a>
            </div>
            
            <table class="table table-sm table-bordered mb-0"
                   th:if="${bookings != null and not #lists.isEmpty(bookings)}">
              <thead class="table-light">
                <tr>
                  <th>Venue</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Status</th>
                  <th>Admin Note</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="b : ${bookings}">
                  <td th:text="${b.venue.name}"></td>
                  <td th:text="${b.bookingDate}"></td>
                  <td th:text="${b.startTime + ' – ' + b.endTime}"></td>
                  <td>
                    <span class="badge"
                          th:text="${b.status}"
                          th:class="${
                            b.status.name() == 'APPROVED'  ? 'badge bg-success'  :
                            b.status.name() == 'REJECTED'  ? 'badge bg-danger'   :
                            b.status.name() == 'CANCELLED' ? 'badge bg-secondary':
                            'badge bg-warning text-dark'}">
                    </span>
                  </td>
                  <td th:text="${b.adminNote ?: '—'}" class="text-muted small"></td>
                </tr>
              </tbody>
            </table>

          </div>
        </div>

      </div>
    </div>
  </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
