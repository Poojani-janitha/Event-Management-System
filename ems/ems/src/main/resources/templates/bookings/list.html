<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: mainLayout(~{::section})}">
<head>
  <title>My Bookings</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
  <section>
  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>My Bookings</h2>
      <a th:href="@{/bookings/new}" class="btn btn-primary">+ New Booking Request</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(bookings)}" class="alert alert-info">
      No bookings yet. <a th:href="@{/bookings/new}">Request one now.</a>
    </div>

    <table class="table table-bordered" th:if="${not #lists.isEmpty(bookings)}">
      <thead class="table-dark">
        <tr>
          <th>Event</th><th>Venue</th><th>Date</th>
          <th>Time</th><th>Status</th><th>Admin Note</th><th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="b : ${bookings}">
          <td th:text="${b.event.title}"></td>
          <td th:text="${b.venue.name}"></td>
          <td th:text="${b.bookingDate}"></td>
          <td th:text="${b.startTime + ' – ' + b.endTime}"></td>
          <td>
            <span th:text="${b.status}"
                  th:class="${
                    b.status.name() == 'APPROVED'  ? 'badge bg-success'  :
                    b.status.name() == 'REJECTED'  ? 'badge bg-danger'   :
                    b.status.name() == 'CANCELLED' ? 'badge bg-secondary':
                    'badge bg-warning text-dark'}">
            </span>
          </td>
          <td th:text="${b.adminNote ?: '—'}"></td>
          <td>
           
            <form th:if="${b.status.name() == 'PENDING'}"
                  th:action="@{/bookings/{id}/cancel(id=${b.id})}"
                  method="post"
                  onsubmit="return confirm('Cancel this booking request?')">
              <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button class="btn btn-sm btn-outline-danger">Cancel</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  </section>
</body>
</html>
