<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: mainLayout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Member Page</title>
</head>
<body>
  <section class="py-2">
    <!-- Header Section -->
    <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <div>
                <h2 class="fw-bold mb-1" th:text="${society.name} + ' Members'">Society Members</h2>
                <p class="text-muted mb-0 small">Manage society members and their roles</p>
            </div>
            <a th:href="@{/societies}" class="btn btn-outline-primary btn-md">
                <i class="bi bi-arrow-left me-2"></i>Back to societies
            </a>
        </div>
        <div class="badge bg-primary text-white px-3 py-1" th:text="'Total Members: ' + ${members.size()}"></div>
    </div>

    <!-- Error Alert -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-2 py-2 px-3" role="alert">
        <i class="bi bi-exclamation-circle-fill me-2"></i>
        <strong class="small">Error!</strong> <span class="small" th:text="${error}"></span>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Success Alert -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3 py-2 px-3" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <strong class="small">Success!</strong> <span class="small" th:text="${success}"></span>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Add Member Section -->
    <div class="card border-0 shadow-lg mb-3" style="border-left: 4px solid #198754;">
        <div class="card-header bg-white border-0 p-3">
            <h6 class="fw-bold mb-0"><i class="bi bi-person-plus text-success me-2"></i> Add New Member</h6>
        </div>
        <div class="card-body p-3">
            <form th:action="@{/societies/{id}/add-member(id=${society.id})}" method="post" class="row g-2 align-items-end">
                <div class="col-md-9">
                    <label for="userSelect" class="form-label fw-bold mb-1 small">Select User</label>
                    <select id="userSelect" name="userId" class="form-select form-select-sm" required>
                        <option value="">-- Choose a user to add --</option>
                        <option th:each="user : ${allUsers}" th:value="${user.id}" th:text="${user.fullName + ' (' + user.email + ')'}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-success btn-sm w-100 fw-bold">
                        <i class="bi bi-plus-circle me-2"></i>Add Member
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Members Table Section -->
    <div class="card border-0 shadow-lg overflow-hidden">
        <div class="card-header bg-gradient text-white p-3" style="background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);">
            <h6 class="fw-bold mb-0"><i class="bi bi-people me-2"></i> Members List</h6>
        </div>
        <div th:if="${!members.isEmpty()}" class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-primary">
                    <tr>
                        <th class="fw-bold ps-4 py-3"><i class="bi bi-person-circle me-2"></i>Name</th>
                        <th class="fw-bold py-3"><i class="bi bi-shield-check me-2"></i>Role</th>
                        <th class="fw-bold py-3"><i class="bi bi-envelope me-2"></i>Email</th>
                        <th class="fw-bold text-center py-3"><i class="bi bi-sliders me-2"></i>Actions</th>
                    </tr>
                </thead>
                <tbody class="border-0">
                    <tr th:each="m : ${members}" th:class="${m.roleInSociety.name() == 'ADMIN' ? 'bg-primary bg-opacity-10 fw-semibold' : 'border-bottom'}">
                        <td class="ps-4 py-3 align-middle">
                            <div class="d-flex align-items-center">
                                <div class="rounded-circle bg-primary bg-opacity-25 p-2 me-3" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                                    <i class="bi bi-person text-primary fw-bold"></i>
                                </div>
                                <span th:text="${m.user.fullName}" class="fw-bold">Name</span>
                            </div>
                        </td>
                        <td class="py-3 align-middle">
                            <span class="badge px-3 py-2 rounded-pill" th:classappend="${m.roleInSociety.name() == 'ADMIN' ? 'bg-primary' : 'bg-secondary'}" th:text="${m.roleInSociety}"></span>
                        </td>
                        <td class="py-3 align-middle">
                            <small class="text-muted" th:text="${m.user.email}">Email</small>
                        </td>
                        <td class="text-center py-3 align-middle">
                            <form th:action="@{/societies/{id}/remove-member/{memberId}(id=${society.id}, memberId=${m.id})}" method="post" style="display: inline;" onsubmit="return confirm('Are you sure you want to remove this member?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger fw-bold">
                                    <i class="bi bi-trash2 me-1"></i>Remove
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${members.isEmpty()}" class="p-4 text-center bg-light">
            <div class="mb-3">
                <i class="bi bi-inbox fs-1 text-muted opacity-50"></i>
            </div>
            <p class="text-muted fw-bold mb-1">No members in this society yet</p>
            <small class="text-muted">Add your first member using the form above</small>
        </div>
    </div>
  </section>
</body>
</html>
