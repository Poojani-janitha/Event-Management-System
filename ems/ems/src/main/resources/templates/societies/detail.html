<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: mainLayout(~{::section})}">
<body>
<section class="py-4">
    <a th:href="@{/societies}" class="btn btn-outline-primary btn-md mb-4">
        <i class="bi bi-arrow-left me-2"></i> Back to Societies
    </a>

    <div class="row g-5">
        <div class="col-lg-4">
            <!-- Main Info Card -->
            <div class="card border-0 shadow-lg overflow-hidden">
                <div class="card-header bg-primary bg-opacity-10 border-bottom-0 p-4 text-center">
                    <div class="bg-primary bg-opacity-25 rounded-circle d-inline-flex align-items-center justify-content-center mx-auto" style="width: 90px; height: 90px;">
                        <i class="bi bi-people-fill fs-2 text-primary"></i>
                    </div>
                </div>
                <div class="card-body text-center p-4">
                    <h4 class="fw-bold mb-2" th:text="${society.name}">Society Name</h4>
                    <span th:class="${society.active ? 'badge bg-success' : 'badge bg-danger'}"
                          th:text="${society.active ? '✓ Active' : '✗ Inactive'}">Status</span>
                </div>
                <div class="border-top"></div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <p class="text-muted small fw-bold mb-1">Email</p>
                        <p class="mb-0" th:text="${society.contactEmail}">email@faculty.lk</p>
                    </div>
                    <div class="mb-3">
                        <p class="text-muted small fw-bold mb-1">Total Members</p>
                        <span th:text="${memberCount}" class="badge bg-primary px-3 py-2"></span>
                    </div>
                    <div>
                        <p class="text-muted small fw-bold mb-1">Administrator</p>
                        <p class="mb-0" th:text="${society.societyAdmin.fullName}"></p>
                    </div>
                </div>
            </div>

            <!-- Admin Panel Card -->
            <div class="card border-0 shadow-lg mt-4 overflow-hidden" sec:authorize="hasRole('ADMIN')">
                <div class="card-header bg-warning bg-opacity-10 border-bottom-0 p-4">
                    <h6 class="fw-bold mb-0"><i class="bi bi-gear-fill me-2 text-warning"></i>Admin Controls</h6>
                </div>
                <div class="card-body p-3 d-grid gap-2">
                    <a th:href="@{/societies/{id}/edit(id=${society.id})}" class="btn btn-warning btn-sm fw-bold">
                        <i class="bi bi-pencil-square me-2"></i>Edit Details
                    </a>
                    <form th:action="@{/societies/{id}/toggle(id=${society.id})}" method="post">
                        <button type="submit" class="w-100 btn fw-bold btn-sm"
                                th:class="${society.active ? 'btn btn-outline-danger w-100 fw-bold btn-sm' : 'btn btn-outline-success w-100 fw-bold btn-sm'}"
                                th:text="${society.active ? 'Deactivate' : 'Activate'}">
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <!-- About Section -->
            <div class="card shadow-lg border-0 overflow-hidden mb-4">
                <div class="card-header bg-primary bg-opacity-10 border-bottom-0 p-4">
                    <h5 class="fw-bold mb-0"><i class="bi bi-info-circle me-2 text-primary"></i>About the Society</h5>
                </div>
                <div class="card-body p-4">
                    <p class="text-secondary lh-lg mb-0" th:text="${society.description}" style="white-space: pre-wrap;"></p>
                </div>
            </div>

            <!-- Admin Info Section -->
            <div class="card shadow-lg border-0 overflow-hidden">
                <div class="card-header bg-primary bg-opacity-10 border-bottom-0 p-4">
                    <h5 class="fw-bold mb-0"><i class="bi bi-person-badge me-2 text-primary"></i>Society Administrator</h5>
                </div>
                <div class="card-body p-4">
                    <div class="d-flex align-items-center mb-3">
                        <div class="bg-primary text-white rounded-circle p-2 me-3 d-inline-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <div>
                            <h6 class="fw-bold mb-0" th:text="${society.societyAdmin.fullName}">Admin Name</h6>
                            <small class="text-muted" th:text="${society.societyAdmin.email}">admin@faculty.lk</small>
                        </div>
                    </div>
                    <div class="border-top pt-3">
                        <a th:href="@{/societies/{id}/members(id=${society.id})}" class="btn btn-primary btn-sm fw-bold">
                            <i class="bi bi-people me-2"></i>View All Members
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
