<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
        th:replace="~{fragments/layout :: mainLayout(~{::section})}">
<head>
    <title>Faculty Societies</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Faculty Societies</h2>
        <a href="#" class="btn btn-primary rounded-pill px-4">
            <i class="bi bi-plus-lg"></i>Create Society
        </a>
    </div>

    <div class="row g-4">
        <div class="col-md-4" th:each="s : ${societies}">
            <div class="card shadow-sm border-0 h-100 p-3">
                <div class="card-body text-center">
                    <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                        style="width: 80px; height: 80px;">
                        <i class="bi bi-people-fill fs-1 text-primary"></i>
                    </div>
                    <h5 class="fw-bold" th:text="${s.name}">Society Name</h5>
                    <p class="text-muted small" th:text="${s.description}">Society Description</p>
                    <hr>
                    <div class="d-flex justify-content-between small mb-3">
                        <span><i class="bi bi-person-badge me-1"></i> Admin:</span>
                        <span class="fw-bold" th:text="${s.societyAdmin.fullName}">Admin Name</span>
                    </div>
                    <a th:href="@{'/societies/' + ${s.id}}" class="btn btn-outline-primary w-100 rounded-pill">View Details</a>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
