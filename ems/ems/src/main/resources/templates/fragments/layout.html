<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="mainLayout(content)">
<head>
  <meta charset="UTF-8">
  <title>Faculty EMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <style>
    /* Simple sidebar styling */
    .sidebar { width: 250px; min-height: 100vh; transition: all 0.3s; }
    .main-content { flex-grow: 1; background-color: #f8f9fa; }
    .card { border-radius: 15px; }
  </style>
</head>
<body>
<div class="d-flex">
  <nav class="sidebar bg-white border-end shadow-sm">
    <div class="p-3 border-bottom">
      <h4 class="text-primary mb-0"><i class="bi bi-visualboard"></i> Visualboard</h4>
    </div>
    <div class="list-group list-group-flush p-2">
      <a th:href="@{/dashboard}" class="list-group-item list-group-item-action border-0 py-3 rounded">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
      </a>
      <a th:href="@{/societies}" class="list-group-item list-group-item-action border-0 py-3 rounded">
        <i class="bi bi-people me-2"></i> Societies
      </a>
      <a th:href="@{/events}" class="list-group-item list-group-item-action border-0 py-3 rounded">
        <i class="bi bi-calendar-event me-2"></i> Events
      </a>
      <a th:href="@{/bookings/new}" class="list-group-item list-group-item-action border-0 py-3 rounded"
         sec:authorize="hasAnyRole('ADMIN', 'SOCIETY_ADMIN')">
        <i class="bi bi-plus-circle me-2"></i> Book Venue
      </a>
      <a th:href="@{/users}" class="list-group-item list-group-item-action border-0 py-3 rounded"
         sec:authorize="hasRole('ADMIN')">
        <i class="bi bi-people me-2"></i> User Management
      </a>
    </div>
  </nav>

  <div class="main-content">
    <header class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-4 py-3 shadow-sm">
      <div class="container-fluid">
        <span class="navbar-text fw-bold text-dark fs-5">Good Morning, User</span>
        <div class="ms-auto d-flex align-items-center">
          <button class="btn btn-light position-relative me-3 rounded-circle">
            <i class="bi bi-bell"></i>
          </button>
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-outline-danger btn-sm rounded-pill px-3">Logout</button>
          </form>
        </div>
      </div>
    </header>

    <main class="p-4">
      <div th:insert="${content}"></div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
