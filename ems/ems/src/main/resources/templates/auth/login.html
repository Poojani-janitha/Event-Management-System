<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Faculty EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .auth-card {
            max-width: 420px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .auth-brand { color: #0d6efd; font-weight: 700; font-size: 1.4rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="auth-card card p-4 p-md-5">
    <div class="text-center mb-4">
        <div class="auth-brand mb-1"><i class="bi bi-calendar-event me-2"></i>Faculty EMS</div>
        <p class="text-muted small">Sign in to your account</p>
    </div>

    <div th:if="${param.logout}" class="alert alert-success py-2 small">You have been logged out.</div>
    <div th:if="${param.error}" class="alert alert-danger py-2 small">Invalid username or password.</div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-person text-muted"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Login</button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
        Don't have an account?
        <a th:href="@{/register}" class="text-primary text-decoration-none fw-semibold">Register</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
