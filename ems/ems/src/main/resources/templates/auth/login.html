<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Faculty EMS</title>
</head>
<body>
<h2>Login</h2>

<p th:if="${param.logout}" style="color:green">You have been logged out.</p>
<p th:if="${param.error}" style="color:red">Invalid username or password.</p>

<form th:action="@{/login}" method="post">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

<a th:href="@{/register}">Don't have an account? Register</a>
</body>
</html>
