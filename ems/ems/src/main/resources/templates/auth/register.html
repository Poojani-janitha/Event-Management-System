<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Faculty EMS</title>
</head>
<body>
<h2>Create Account</h2>

<form th:action="@{/register}" th:object="${user}" method="post">
    <div>
        <input type="text" th:field="*{username}" placeholder="Username">
        <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red"></span>
    </div>
    <div>
        <input type="email" th:field="*{email}" placeholder="Email">
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red"></span>
    </div>
    <div>
        <input type="password" th:field="*{password}" placeholder="Password">
        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red"></span>
    </div>
    <div>
        <input type="text" th:field="*{fullName}" placeholder="Full Name">
        <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" style="color:red"></span>
    </div>
    <button type="submit">Register</button>
</form>

<p th:if="${success}" th:text="${success}" style="color:green"></p>
<p th:if="${error}" th:text="${error}" style="color:red"></p>

<a th:href="@{/login}">Already have an account? Login</a>
</body>
</html>
