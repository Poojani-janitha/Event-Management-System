<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Faculty EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .auth-card {
            max-width: 480px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .auth-brand { color: #0d6efd; font-weight: 700; font-size: 1.4rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">

<div class="auth-card card p-4 p-md-5">
    <div class="text-center mb-4">
        <div class="auth-brand mb-1"><i class="bi bi-calendar-event me-2"></i>Faculty EMS</div>
        <p class="text-muted small">Create your account</p>
    </div>

    <div th:if="${success}" class="alert alert-success py-2 small" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-person text-muted"></i></span>
                <input type="text" th:field="*{username}" class="form-control" placeholder="Choose a username">
            </div>
            <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger small"></span>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-envelope text-muted"></i></span>
                <input type="email" th:field="*{email}" class="form-control" placeholder="your@email.com">
            </div>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small"></span>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Full Name</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-person-badge text-muted"></i></span>
                <input type="text" th:field="*{fullName}" class="form-control" placeholder="Your full name">
            </div>
            <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-danger small"></span>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" th:field="*{password}" class="form-control" placeholder="Min. 8 characters">
            </div>
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small"></span>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Create Account</button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
        Already have an account?
        <a th:href="@{/login}" class="text-primary text-decoration-none fw-semibold">Login</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
