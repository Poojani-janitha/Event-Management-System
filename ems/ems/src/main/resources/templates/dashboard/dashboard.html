<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: mainLayout(~{::section})}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dashboard</title>
</head>
<body>
<section>
    <h2>Welcome, <span th:text="${username}"></span></h2>

    <div sec:authorize="hasRole('ADMIN')">
        <h3>Admin Panel</h3>
        <p>Manage users, events, and system settings.</p>
    </div>

    <div sec:authorize="hasRole('SOCIETY_ADMIN')">
        <h3>Society Admin Panel</h3>
        <p>Manage your society's events and bookings.</p>
    </div>

    <div sec:authorize="hasRole('MEMBER')">
        <h3>Member Dashboard</h3>
        <p>Browse and register for upcoming events.</p>
    </div>
</section>
</body>
</html>
