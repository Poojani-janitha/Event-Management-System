<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: mainLayout(~{::section})}">
<head>
  <title>Dashboard</title>
</head>
<body>
<section>
  <div class="card bg-success text-white mb-4 p-5 shadow border-0"
       style="background: linear-gradient(45deg, #198754, #20c997);">
    <div class="row align-items-center">
      <div class="col-md-8">
        <h2 class="fw-bold">Here's happening in your sales last weeks 👋</h2>
        <p class="display-5 fw-bold mt-3">$8,567.00</p>
        <button class="btn btn-light mt-2 rounded-pill px-4">View report &rarr;</button>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-md-8">
      <div class="card p-4 shadow-sm h-100 border-0">
        <h5 class="fw-bold mb-4">Sales Funnel</h5>
        <div class="text-center py-5 text-muted">
          <i class="bi bi-bar-chart display-1"></i>
          <p class="mt-3">Chart data will load here...</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-4 shadow-sm h-100 border-0">
        <h5 class="fw-bold mb-4">Next Upcoming Event</h5>
        <div class="d-flex align-items-center p-3 bg-light rounded mb-3">
          <div class="bg-primary text-white p-2 rounded me-3">
            <i class="bi bi-calendar-check"></i>
          </div>
          <div>
            <p class="mb-0 fw-bold">Annual Workshop</p>
            <small class="text-muted">Seminar Hall - 10:00 AM</small>
          </div>
        </div>
        <a href="#" class="btn btn-primary w-100 rounded-pill">View event calendar &rarr;</a>
      </div>
    </div>
  </div>
</section>
</body>
</html>
