<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: mainLayout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Society Requests - Admin Panel</title>
</head>
<body>
<section class="py-4">
    <div class="container-fluid">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold">Society Admin Requests</h3>
                <p class="text-muted">Review and manage society creation requests</p>
            </div>
        </div>

        <!-- Alert Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle me-2"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Status Filter -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="btn-group" role="group">
                    <a th:href="@{/admin/society-requests}" class="btn btn-outline-primary"
                       th:classappend="${selectedStatus == null ? 'active' : ''}">
                        <i class="bi bi-list me-1"></i>All
                    </a>
                    <a th:href="@{/admin/society-requests(status='PENDING')}" class="btn btn-outline-warning"
                       th:classappend="${selectedStatus == 'PENDING' ? 'active' : ''}">
                        <i class="bi bi-hourglass-split me-1"></i>Pending
                    </a>
                    <a th:href="@{/admin/society-requests(status='APPROVED')}" class="btn btn-outline-success"
                       th:classappend="${selectedStatus == 'APPROVED' ? 'active' : ''}">
                        <i class="bi bi-check-circle me-1"></i>Approved
                    </a>
                    <a th:href="@{/admin/society-requests(status='REJECTED')}" class="btn btn-outline-danger"
                       th:classappend="${selectedStatus == 'REJECTED' ? 'active' : ''}">
                        <i class="bi bi-x-circle me-1"></i>Rejected
                    </a>
                </div>
            </div>
        </div>

        <!-- Requests Table -->
        <div class="card shadow-lg border-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Requester</th>
                            <th>Society Name</th>
                            <th>Email</th>
                            <th>Requested</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="req : ${requests}">
                            <td th:text="${req.id}"></td>
                            <td>
                                <strong th:text="${req.user.fullName}"></strong>
                                <br>
                                <small class="text-muted" th:text="${req.user.email}"></small>
                            </td>
                            <td th:text="${req.societyName}"></td>
                            <td th:text="${req.contactEmail}"></td>
                            <td>
                                <small class="text-muted" th:text="${#temporals.format(req.createdAt, 'dd MMM yyyy')}"></small>
                            </td>
                            <td>
                                <span th:class="${req.status.name() == 'PENDING'} ? 'badge bg-warning' : 
                                              (${req.status.name() == 'APPROVED'} ? 'badge bg-success' : 'badge bg-danger')"
                                      th:text="${req.status.name()}">Status</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/society-requests/{id}(id=${req.id})}" class="btn btn-sm btn-outline-info me-1">
                                    <i class="bi bi-eye"></i> View
                                </a>
                                <div th:if="${req.status.name() == 'PENDING'}" class="btn-group btn-group-sm" role="group">
                                    <form th:action="@{/admin/society-requests/{id}/approve(id=${req.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-outline-success me-1" 
                                                onclick="return confirm('Approve this request?')">
                                            <i class="bi bi-check-lg"></i>
                                        </button>
                                    </form>
                                    <button type="button" class="btn btn-outline-danger" data-bs-toggle="modal" 
                                            th:data-bs-target="'#rejectModal' + ${req.id}">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(requests)}" class="card shadow-lg border-0 mt-4">
            <div class="card-body text-center py-5">
                <i class="bi bi-inbox fs-1 text-muted d-block mb-3"></i>
                <h5 class="fw-bold">No Requests Found</h5>
                <p class="text-muted">No society admin requests to display</p>
            </div>
        </div>
    </div>

    <!-- Reject Modal Templates -->
    <div th:each="req : ${requests}" th:if="${req.status.name() == 'PENDING'}">
        <div class="modal fade" th:id="'rejectModal' + ${req.id}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Reject Request</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/admin/society-requests/{id}/reject(id=${req.id})}" method="post">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Reason for Rejection</label>
                                <textarea name="reason" class="form-control" rows="3" 
                                          placeholder="Provide a reason for rejecting this request..." required></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-danger">Reject Request</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
