<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: mainLayout(~{::section})}"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>User Management</title>
</head>

<body>
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0">User Management</h4>
            <!--        <a th:href="@{/register}" class="btn btn-primary btn-sm">-->
            <!--            <i class="bi bi-person-plus me-1"></i> Add New User-->
            <!--        </a>-->
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Full Name</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.email}"></td>
                            <td th:text="${user.fullName}"></td>
                            <td>
                                <span th:text="${user.role}"
                                    th:classappend="${user.role.name() == 'ADMIN'} ? 'badge bg-danger' : (${user.role.name() == 'SOCIETY_ADMIN'} ? 'badge bg-warning text-dark' : 'badge bg-secondary')">
                                </span>
                            </td>
                            <td>
                                <span th:text="${user.enabled ? 'Active' : 'Disabled'}"
                                    th:classappend="${user.enabled} ? 'badge bg-success' : 'badge bg-secondary'">
                                </span>
                            </td>
                            <td>
                                <a th:href="@{/users/{id}/edit(id=${user.id})}"
                                    class="btn btn-sm btn-outline-primary me-1">Edit</a>
                                <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post" class="d-inline"
                                    onsubmit="return confirm('Delete this user?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</body>

</html>
