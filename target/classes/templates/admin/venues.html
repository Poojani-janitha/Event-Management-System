<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Venues - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="main-content">
    <div class="page-header">
        <h1><i class="fas fa-building"></i> Manage Venues</h1>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle"></i> <span th:text="${success}"></span></div>
    <div th:if="${error}" class="alert alert-error"><i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span></div>

    <div class="grid-2col">
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-plus-circle"></i> Add New Venue</h2>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/venues/add}" th:object="${venue}" method="post" class="form">
                    <div class="form-group">
                        <label>Venue Name</label>
                        <input type="text" th:field="*{name}" placeholder="e.g., Main Auditorium" required>
                    </div>
                    <div class="form-group">
                        <label>Venue Type</label>
                        <select th:field="*{type}" required>
                            <option value="">Select type...</option>
                            <option th:each="type : ${venueTypes}" th:value="${type}" th:text="${type}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Capacity</label>
                        <input type="number" th:field="*{capacity}" placeholder="e.g., 200" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea th:field="*{description}" placeholder="Describe the venue..." rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Venue
                    </button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-list"></i> Existing Venues</h2>
            </div>
            <div class="card-body">
                <div th:each="v : ${venues}" class="venue-item">
                    <div class="venue-info">
                        <div class="venue-icon">
                            <i th:class="${v.type.name() == 'AUDITORIUM'} ? 'fas fa-theater-masks' : (${v.type.name() == 'SEMINAR_HALL'} ? 'fas fa-chalkboard-teacher' : 'fas fa-laptop-code')"></i>
                        </div>
                        <div>
                            <strong th:text="${v.name}"></strong>
                            <br>
                            <small>
                                <span th:text="${v.type}"></span> |
                                Capacity: <span th:text="${v.capacity}"></span>
                            </small>
                            <br>
                            <span class="badge" th:classappend="${v.available} ? 'badge-success' : 'badge-secondary'"
                                  th:text="${v.available} ? 'Available' : 'Unavailable'"></span>
                        </div>
                    </div>
                    <div class="venue-actions">
                        <form th:action="@{/admin/venues/{id}/toggle(id=${v.id})}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-sm"
                                    th:classappend="${v.available} ? 'btn-warning' : 'btn-success'"
                                    th:text="${v.available} ? 'Disable' : 'Enable'"></button>
                        </form>
                        <form th:action="@{/admin/venues/{id}/delete(id=${v.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Delete this venue?')">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </div>
                </div>
                <p th:if="${#lists.isEmpty(venues)}" class="text-center text-muted">No venues yet.</p>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
