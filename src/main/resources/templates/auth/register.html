<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Event Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-plus fa-3x"></i>
            <h1>Register</h1>
            <p>Create your society manager account</p>
        </div>

        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/auth/register}" th:object="${user}" method="post" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Full Name</label>
                <input type="text" th:field="*{name}" placeholder="Enter your full name" required>
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" th:field="*{email}" placeholder="Enter your email" required>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" th:field="*{password}" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-users"></i> Society Name</label>
                <input type="text" th:field="*{society}" placeholder="e.g., Computing Society" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-user-plus"></i> Register
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a th:href="@{/auth/login}">Login here</a></p>
        </div>
    </div>
</div>
</body>
</html>
