<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="main-content">
    <div class="page-header">
        <h1><i class="fas fa-users"></i> Manage Users</h1>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle"></i> <span th:text="${success}"></span></div>

    <div class="card">
        <div class="card-body">
            <table class="table" th:if="${not #lists.isEmpty(users)}">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Society</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u, stat : ${users}">
                        <td th:text="${stat.index + 1}"></td>
                        <td th:text="${u.name}"></td>
                        <td th:text="${u.email}"></td>
                        <td th:text="${u.society}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${u.role.name() == 'ADMIN'} ? 'badge-danger' : 'badge-info'"
                                  th:text="${u.role}"></span>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post"
                                  onsubmit="return confirm('Delete this user?')">
                                <button type="submit" class="btn btn-danger btn-sm">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <p th:if="${#lists.isEmpty(users)}" class="text-center text-muted">No users found.</p>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
